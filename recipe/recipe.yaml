schema_version: 1

context:
  version: "0.7.3"
  # Upstream alex-pinkus/tree-sitter-swift checks in generated parser.c only under
  # the `-with-generated-files` tag — the plain `0.7.x` tags are missing
  # src/parser.c and won't build without running `tree-sitter generate`. Also,
  # upstream has never bumped pyproject.toml's `version` field from `0.0.1`,
  # so we patch it at build time (see patches/0001-bump-pyproject-version-to-match-tag.patch)
  # to match the actual tag. Otherwise downstreams with `pip check` fail their
  # tests because the bundled dist-info says `0.0.1`.
  tag: "0.7.3-with-generated-files"

package:
  name: tree-sitter-swift
  version: ${{ version }}

source:
  url: https://github.com/alex-pinkus/tree-sitter-swift/archive/refs/tags/${{ tag }}.tar.gz
  sha256: e2e84d3b97cf6a0afbcab793c4910123da92a34c395b09cc8d0880562a21e956
  patches:
    - patches/0001-bump-pyproject-version-to-match-tag.patch

build:
  number: 2
  # abi3 packages build once at python_min and ship one artifact per platform.
  skip: is_abi3 and not is_python_min
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    version_independent: ${{ is_abi3 }}

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ stdlib("c") }}
  host:
    - if: is_abi3
      then: python-abi3
    - python
    - pip
    - setuptools >=42
  run:
    - python

tests:
  - python:
      imports:
        - tree_sitter_swift
      # Verify the abi3 wheel works on the build-time Python AND the latest.
      python_version:
        - if: is_abi3
          then: ${{ python_min }}.*
        - "*"
  - if: is_abi3
    then:
      requirements:
        run:
          - abi3audit
      script:
        - if: unix
          then: abi3audit $SP_DIR/tree_sitter_swift/_binding.abi3.so -s -v --assume-minimum-abi3 ${{ python_min }}
          else: abi3audit %SP_DIR%/tree_sitter_swift/_binding.pyd -s -v --assume-minimum-abi3 ${{ python_min }}

about:
  homepage: https://github.com/alex-pinkus/tree-sitter-swift
  summary: Swift grammar for tree-sitter
  license: MIT
  license_file: LICENSE
  repository: https://github.com/alex-pinkus/tree-sitter-swift

extra:
  recipe-maintainers:
    - killua156
    - mgorny
    - rxm7706
